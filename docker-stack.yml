version: '3.9'

services:
  mongo1:
    image: mongo:latest
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo1_data:/data/db
    networks:
      - appnet

  mongo2:
    image: mongo:latest
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo2_data:/data/db
    networks:
      - appnet

  mongo3:
    image: mongo:latest
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo3_data:/data/db
    networks:
      - appnet

  backend:
    image: marinatraba/undersounds-backend:latest
    environment:
      - MONGO_URI=mongodb://mongo1:27017,mongo2:27017,mongo3:27017/undersounds?replicaSet=rs0
      - BASE_URL=http://localhost:8081
    ports:
      - "5000:5000"
    env_file:
      - ./back-end/.env
    deploy:
      replicas: 3
      #ROLLING UPDATE PARA BACKEND
      update_config:
        parallelism: 1           # Actualiza 1 réplica a la vez
        delay: 10s               # Espera 10s entre réplicas
        failure_action: rollback # Si falla, vuelve a versión anterior
        order: start-first       # Primero arranca el nuevo, luego apaga el viejo
      restart_policy:
        condition: on-failure
    networks:
      - appnet

  nginx:
    image: nginx:latest
    volumes:
      - ./back-end/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"
    deploy:
      replicas: 3  # <--- Ahora tienes 3 entradas trabajando juntas
      update_config:
        parallelism: 1 # si hay alguna actualizacion, se hace de una en una para evitar downtime
        delay: 10s # espera 10 segundos entre cada actualizacion para asegurar que el servicio este estable
      restart_policy:
        condition: on-failure
    networks:
      - appnet

  frontend:
    image: marinatraba/undersounds-frontend:latest
    ports:
      - "8083:8080"
    environment:
      - REACT_APP_API_URL=http://localhost:8081
    env_file:
      - ./front-end/.env
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - appnet

networks:
  appnet:
    driver: overlay

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
