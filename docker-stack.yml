version: '3.9'

services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - appnet

  backend:
    image: marinatraba/undersounds-backend:latest
    environment:
      - MONGO_URI=mongodb://mongo:27017/undersounds
      - BASE_URL=http://backend:5000
    expose:
      - "5000"
    env_file:
      - ./back-end/.env
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
    networks:
      - appnet

  nginx:
    image: nginx:latest
    volumes:
      - ./back-end/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - appnet

  frontend:
    image: marinatraba/undersounds-frontend:latest
    ports:
      - "8083:8080"
    environment:
      - REACT_APP_API_URL=http://localhost:8081
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - appnet

networks:
  appnet:
    driver: overlay

volumes:
  mongo_data:
    driver: local
